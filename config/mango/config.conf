
# =============================================================================
#  MangoWM config  --  MAINTENANCE SIGNPOST (read this if things break)
# =============================================================================
#  IF SOMETHING STOPPED WORKING AFTER A SYSTEM UPDATE, here is where each part of
#  the per-monitor tile/float setup lives. (Most update breakage is actually in
#  the two helper SCRIPTS, not this file -- each script has its own clearly marked
#  "EDIT HERE AFTER A MANGO UPDATE" section at its top.)
#
#    * Per-monitor TILE/FLOAT modes -> the "Per-monitor window mode" tagrule block
#      below. A monitor FLOATS if its 9 tagrules contain "open_as_floating:1";
#      it TILES if they don't. (You normally change these with the Monitor Mode
#      bar plugin, not by hand.)
#    * The float helper that sizes/positions windows -> the "exec-once" line that
#      starts ~/.config/mango/scripts/dp2-floatsize.sh (just below).
#    * Reload the config after editing -> press SUPER+r (bind near the bottom).
#    * Steam handling -> see the commented note in the "Rules" section (bottom).
#    * Plain-English guide ->
#      ~/.config/DankMaterialShell/plugins/monitorMode/README.md
# =============================================================================

# autostart your favorite applications here

exec-once = dms run &
exec-once = bash -c wl-paste --watch cliphist store &  # optional: clipboard history | cliphist is needed
exec-once=easyeffects --gapplication-service
# Per-monitor float/tile is native (tagrule monitor_name + open_as_floating).
# Size-only helper: centers + sizes new floating windows on a FLOAT-mode monitor
# (mango can't size open_as_floating windows declaratively). Resolution-independent.
exec-once = ~/.config/mango/scripts/dp2-floatsize.sh
# Makes window borders follow the wallpaper automatically: watches DMS-generated
# dms/colors.conf and issues the correct 0.14 reload (DMS's own hook uses the dead
# 0.13 `mmsg -d` form). See the script header for the full COLOR CHAIN write-up.
exec-once = ~/.config/mango/scripts/wallpaper-border-reload.sh

# | Outputs Configuration |
# Configure your monitors here or in the DMS "Displays" settings. | https://mangowm.github.io/docs/configuration/monitors
# Run `wlr-randr` to get your monitors information.
# You will have to remove "#" and edit it for it to take effect.

# monitorrule = name:YOUR-OUTPUT, width:2560, height:1440, refresh:144, x:0, y:0, rr:0, vrr:1


# | Per-monitor window mode |   >>> AUTO-GENERATED -- normally nothing to do here <<<
# Layouts are per-tag and tags are per-monitor, so per-monitor behaviour = one
# tagrule per (monitor, tag). mango needs LITERAL output names here and can't
# auto-detect them from the config -- so DankMango generates them for you:
#
#   Tagrules are now AUTO-GENERATED at install time (and any time you re-run
#   scripts/generate-tagrules.sh) into  dms/tagrules.conf , which is sourced in the
#   source block lower down. The generator queries your connected outputs
#   (mmsg get all-monitors) and writes one 9-line TILE block per monitor. Re-run it
#   after docking a laptop / adding a monitor, then reload with SUPER+r:
#       ~/.config/mango/scripts/generate-tagrules.sh
#   Toggle a monitor to FLOAT with the Monitor Mode bar plugin (no editing needed).
#
# The commented block BELOW is a manual-fallback reference only -- for unusual setups
# the generator doesn't handle well, or if you want to hand-tune a specific monitor's
# rules. If you use it, put your rules here (or in dms/tagrules.conf) with LITERAL
# output names (find them: mmsg get all-monitors | jq '.monitors[].name'), e.g.
# eDP-1, HDMI-A-1, DP-1. Reload with SUPER+r after editing.
#
#   TILING  monitor  -> layout_name:tile        (windows tile; mango's default)
#   FLOATING monitor -> append ", open_as_floating:1"  (windows open floating and are
#                       centered + sized big by scripts/dp2-floatsize.sh)
# Layouts: tile, scroller, grid, deck, monocle, center_tile, vertical_tile, vertical_scroller
#
# NOTE: the Monitor Mode bar plugin / set-monitor-mode.sh toggle a monitor between
# float and tile by rewriting the generated rules in dms/tagrules.conf, so a monitor
# must have its 9 tagrules present (auto-generated, or added here) for the plugin to
# control it. Manual-fallback template (uncomment + rename to use it directly):
#
# tagrule = id:1, monitor_name:MONITOR-1, layout_name:tile
# tagrule = id:2, monitor_name:MONITOR-1, layout_name:tile
# tagrule = id:3, monitor_name:MONITOR-1, layout_name:tile
# tagrule = id:4, monitor_name:MONITOR-1, layout_name:tile
# tagrule = id:5, monitor_name:MONITOR-1, layout_name:tile
# tagrule = id:6, monitor_name:MONITOR-1, layout_name:tile
# tagrule = id:7, monitor_name:MONITOR-1, layout_name:tile
# tagrule = id:8, monitor_name:MONITOR-1, layout_name:tile
# tagrule = id:9, monitor_name:MONITOR-1, layout_name:tile


# | Environment Variables |
# Set your environment variables here. | https://mangowm.github.io/docs/configuration/basics#environment-variables

# env = QT_QPA_PLATFORMTHEME,qt6ct
# env = QT_QPA_PLATFORMTHEME_QT6,qt6ct


# | Input Devices |
# Configure your input devices here. | https://mangowm.github.io/docs/configuration/input

# xkb_rules_layout = us

# NumLock ON for the mango session (native mango key; SDDM handles the login screen).
numlockon=1

# If you want to disable pointer acceleration, uncomment the lines below.
# accel_profile = 1
# accel_speed = 0.2


# | Layout |
# layouts | https://mangowm.github.io/docs/window-management/layouts

# Scrolling layout settings.
scroller_structs = 40
scroller_default_proportion = 0.5
scroller_focus_center = 0
scroller_prefer_center = 0
scroller_prefer_overspread = 1
edge_scroller_pointer_focus = 1
scroller_default_proportion_single = 2.0
scroller_proportion_preset = 0.5, 0.8, 1.0

# Master-Stack layout settings.
new_is_master = 1
default_mfact = 0.55
default_nmaster = 1
smartgaps = 0


# https://mangowm.github.io/docs/configuration/miscellaneous

allow_tearing = 2
# syncobj_enable = 1
# xwayland-persistence = 1

drag_tile_to_tile = 1


# | Look n Feel |
# theming | https://mangowm.github.io/docs/visuals

gappih = 20
gappiv = 20
gappoh = 40
gappov = 40
borderpx = 4
border_radius = 10

scratchpad_width_ratio = 0.8
scratchpad_height_ratio = 0.9

rootcolor = 0x201b14ff
# ===========================================================================
# COLOR CHAIN -- how window borders follow the wallpaper (READ AFTER UPDATES)
# ===========================================================================
# The chain has 3 links. If borders stop following the wallpaper, one broke;
# run the health-check to see which:  ~/.config/mango/scripts/border-color-healthcheck.sh
#
#   LINK 1  GENERATE: change wallpaper -> DMS/matugen writes the border colors to
#           ~/.config/mango/dms/colors.conf   (bordercolor/focuscolor/urgentcolor).
#   LINK 2  SOURCE  : mango reads that file via the line lower in THIS config:
#           "source=~/.config/mango/dms/colors.conf"  (in the source block).
#           GOTCHA (mango 0.14): color precedence is now FIRST-DEFINITION-WINS, so
#           these 3 keys must NOT also be set inline here -- an inline value would
#           override the sourced wallpaper color. That's why they're commented out
#           just below. (Worked on 0.13 because it was last-wins.)
#   LINK 3  RELOAD  : mango doesn't watch colors.conf, so a tiny helper does and
#           reloads mango when it changes:
#           ~/.config/mango/scripts/wallpaper-border-reload.sh (exec-once, top of file).
#           It runs  `mmsg dispatch reload_config`  (the 0.14 form). DMS's OWN hook
#           uses the dead 0.13 `mmsg -d reload_config` -> silently no-ops on 0.14,
#           which is the bug this helper works around. Test by hand after an update:
#               mmsg dispatch reload_config      # expect {"success":true}
# See the wallpaper-border-reload.sh + border-color-healthcheck.sh headers for details.
# ---------------------------------------------------------------------------
# bordercolor / focuscolor / urgentcolor -> provided by dms/colors.conf (LINK 2).
# bordercolor = 0x444444ff
# focuscolor = 0x47add6ff
maximizescreencolor = 0x47add6ff
# urgentcolor = 0xad401fff
scratchpadcolor = 0x516c93ff
globalcolor = 0xb153a7ff
overlaycolor = 0x14a57cff

# Cursor theme + size are provided by DMS via the sourced dms/cursor.conf below,
# so the cursor follows your DMS cursor settings. (No hardcoded cursor_theme here.)

blur = 1
blur_layer = 1
blur_optimized = 1
blur_params_num_passes = 2
blur_params_radius = 4
blur_params_noise = 0.04
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 1
shadow_only_floating = 0
shadows_size = 10
shadows_blur = 5
shadows_position_x = 0
shadows_position_y = 0
shadowscolor = 0x000000ff

animations = 1
layer_animations = 1
animation_type_open = zoom
animation_type_close = zoom
animation_fade_in = 1
animation_fade_out = 1
tag_animation_direction = 1
zoom_initial_ratio = 0.1
zoom_end_ratio = 0.5
fadein_begin_opacity = 0.3
fadeout_begin_opacity = 0.2
animation_duration_move = 300
animation_duration_open = 100
animation_duration_tag = 300
animation_duration_close = 400
animation_duration_focus = 0
animation_curve_open = 0.87, 0, 0.13, 1
animation_curve_move = 0.46, 1.0, 0.29, 1
animation_curve_tag = 0.46, 1.0, 0.29, 1
animation_curve_close = 0.87, 0, 0.13, 1
animation_curve_focus = 0.46, 1.0, 0.29, 1
animation_curve_opafadeout = 0.5, 0.5, 0.5, 0.5
animation_curve_opafadein = 0.46, 1.0, 0.29, 1


# | Keybinds |
# Configure your keybinds here. | https://mangowm.github.io/docs/bindings/keys

# Your favorite applications.
bind = SUPER, Return, spawn, alacritty
bind = SUPER, e, spawn, nemo
bind = SUPER, b, spawn, zen-browser

# DMS specific keybinds.
bind = NONE, XF86Tools, spawn, dms ipc call widget toggle launcherButton
bind = SUPER+CTRL, Return, spawn, dms ipc call spotlight toggle
bind = SUPER, c, spawn, dms ipc call clipboard toggle
bind = SUPER, m, spawn, dms ipc call processlist focusOrToggle
bind = SUPER, s, spawn, dms ipc call settings focusOrToggle
bind = SUPER, n, spawn, dms ipc call notifications toggle
bind = SUPER, w, spawn, dms ipc call dankdash wallpaper
bind = SUPER+SHIFT, q, spawn,  dms ipc call powermenu toggle

# Lockscreen
bind = SUPER+ALT, l, spawn, dms ipc call lock lock

# Screenshots
bind = SUPER, p, spawn, ~/.config/mango/scripts/screenshot.sh

# Reload config
bind = SUPER, r, reload_config

# Audio controls
bind = NONE, XF86AudioRaiseVolume, spawn, dms ipc call audio increment 3
bind = NONE, XF86AudioLowerVolume, spawn, dms ipc call audio decrement 3
bind = NONE, XF86AudioMute, spawn, dms ipc call audio mute

# Media controls (Everest media module -> standard XF86Audio* codes)
bind = NONE, XF86AudioPlay, spawn, dms ipc call mpris playPause
bind = NONE, XF86AudioNext, spawn, dms ipc call mpris next
bind = NONE, XF86AudioPrev, spawn, dms ipc call mpris previous

# Brightness controls
bind = NONE, XF86MonBrightnessUp, spawn, dms ipc call brightness increment 5
bind = NONE, XF86MonBrightnessDown, spawn, dms ipc call brightness decrement 5

bind = SUPER, q, killclient,

# Switch window focus
bind = SUPER, Tab, focusstack, next
bind = SUPER, Left, focusdir, left
bind = SUPER, Right, focusdir, right
bind = SUPER, Up, focusdir, up
bind = SUPER, Down, focusdir, down

# Swap window
bind = SUPER+SHIFT, Up, exchange_client, up
bind = SUPER+SHIFT, Down, exchange_client, down
bind = SUPER+SHIFT, Left, exchange_client, left
bind = SUPER+SHIFT, Right, exchange_client, right

# Switch window status
bind = SUPER, g, toggleglobal,
# ALT+Tab cycles focus to the next window and raises it, and shows the visual
# switcher popup (DMS altSwitcher plugin). Script does focusstack + popup poke.
# ALT+SHIFT+Tab cycles in reverse.
bind = ALT, Tab, spawn, ~/.config/mango/scripts/alt-switcher.sh next
bind = ALT+SHIFT, Tab, spawn, ~/.config/mango/scripts/alt-switcher.sh prev
bind = SUPER+ALT, Tab, toggleoverview,
bind = SUPER, v, togglefloating,
# SUPER+SHIFT+v retired: per-monitor float mode is now set in the tagrule block
# at the top of this file (edit + SUPER+r). SUPER+v still floats the focused window.
#
# Per-monitor MODE COMBOS: now driven by the DankMaterialShell "Monitor Mode" plugin
# (splitscreen bar pill -> popout). The plugin calls set-monitor-mode.sh directly, so the
# old SUPER+ALT+1..4 keybinds were removed as redundant (2026-06-02). To restore a bind:
#   bind = SUPER+ALT, 1, spawn, ~/.config/mango/scripts/set-monitor-mode.sh MONITOR-1:tile MONITOR-2:float
bind = SUPER, f, togglemaximizescreen,
bind = SUPER+SHIFT, f, togglefullscreen,
bind = SUPER+ALT, f, togglefakefullscreen,
bind = SUPER, i, minimized,
bind = SUPER, o, toggleoverlay,
bind = SUPER+SHIFT, I, restore_minimized
bind = SUPER, z, toggle_scratchpad

# Scroller layout
bind = SUPER+SHIFT, e, set_proportion, 1.0
bind = SUPER, x, switch_proportion_preset,

# Switch layout
bind = SUPER, n, switch_layout

# Switch between workspaces
bind = SUPER, 1, view, 1, 0
bind = SUPER, 2, view, 2, 0
bind = SUPER, 3, view, 3, 0
bind = SUPER, 4, view, 4, 0
bind = SUPER, 5, view, 5, 0
bind = SUPER, 6, view, 6, 0
bind = SUPER, 7, view, 7, 0
bind = SUPER, 8, view, 8, 0
bind = SUPER, 9, view, 9, 0

# Tag: move client to another workspace.
# Tagsilent: move client to another workspace but do not focus it.
# E.g bind = SUPER+SHIFT, 1, tagsilent, 1
bind = SUPER+SHIFT ,1, tag, 1, 0
bind = SUPER+SHIFT, 2, tag, 2, 0
bind = SUPER+SHIFT, 3, tag, 3, 0
bind = SUPER+SHIFT, 4, tag, 4, 0
bind = SUPER+SHIFT, 5, tag, 5, 0
bind = SUPER+SHIFT, 6, tag, 6, 0
bind = SUPER+SHIFT, 7, tag, 7, 0
bind = SUPER+SHIFT, 8, tag, 8, 0
bind = SUPER+SHIFT, 9, tag, 9, 0

# Switch between monitors
bind = SUPER+ALT, Left, focusmon, left
bind = SUPER+ALT, Right, focusmon, right
# Move window to another monitor
bind = SUPER+ALT, Left, tagmon, left
bind = SUPER+ALT, Right, tagmon, right

# Gaps
bind = SUPER+SHIFT, X, incgaps, 1
bind = SUPER+SHIFT, Z, incgaps, -1
bind = SUPER+SHIFT, R, togglegaps

# Movewin
bind = CTRL+SHIFT, Up, movewin, +0, -50
bind = CTRL+SHIFT, Down, movewin, +0, +50
bind = CTRL+SHIFT, Left, movewin, -50,+0
bind = CTRL+SHIFT, Right, movewin, +50,+0

# Resizewin
bind = CTRL+ALT, Up, resizewin, +0, -50
bind = CTRL+ALT, Down, resizewin, +0, +50
bind = CTRL+ALT, Left, resizewin, -50, +0
bind = CTRL+ALT, Right, resizewin, +50, +0

# Mouse Button Bindings.
# btn_left and btn_right can't bind none mod key
mousebind = SUPER, btn_left, moveresize,curmove
mousebind = NONE, btn_middle, togglemaximizescreen, 0
mousebind = SUPER, btn_right, moveresize, curresize


# | Rules |
# Window/Tag/Layer rules. | https://mangowm.github.io/docs/window-management/rules

# NOTE: a windowrule width/height does NOT size open_as_floating windows in mango
# 0.13.1 (the engine applies float size before the window is floating, then discards
# it). So float SIZE on a float-mode monitor is handled by scripts/dp2-floatsize.sh instead. Don't
# re-add a global width/height rule here -- it would only resize windows you manually
# float and wouldn't help a float-mode monitor.
# Steam used to be force-floated/tiled by the three windowrules below, but they
# OVERRODE the per-monitor open_as_floating tagrule: the `isfloating:0, title:Steam`
# rule pinned the main Steam window to TILED, so on a float-mode monitor it sat behind
# the floating windows and never got positioned. Disabled so the Steam *client* follows
# each monitor's mode like any normal app (float+size on a float monitor, tile on a
# tile monitor) via the tagrule + dp2-floatsize.sh. Actual GAMES launched from Steam
# (appid steam_app_NNN, gamescope, *.exe) are still skipped by dp2-floatsize.sh's
# GAME_APPID_RE, so they self-manage/fullscreen untouched. (2026-06-12, mango 0.14.2)
# windowrule = isfloating:1, appid:[Ss]team
# windowrule = isfloating:0, title:Steam
# windowrule = isfloating:1, appid:steam, title:Steam Settings

layerrule = noanim:1, noblur:1, layer_name:selection

# LINK 2 of the COLOR CHAIN (see the COLOR CHAIN box up by rootcolor). Do NOT also
# set bordercolor/focuscolor/urgentcolor inline -- 0.14 is first-definition-wins.
source=~/.config/mango/dms/colors.conf
source=~/.config/mango/dms/layout.conf
source=~/.config/mango/dms/outputs.conf
source=~/.config/mango/dms/tagrules.conf

source=./dms/cursor.conf
source = ./dms/binds.conf
